<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Account | Astra</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="privacy_styles.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { max-width: 500px; width: 100%; background: #0a0a0a; padding: 40px; border-radius: 24px; border: 1px solid #1a1a1a; text-align: center; }
        h1 { font-size: 28px; margin-bottom: 16px; }
        p { color: #ccc; margin-bottom: 32px; font-size: 15px; }
        .form-group { text-align: left; margin-bottom: 24px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; padding: 14px; background: #111; border: 1px solid #222; border-radius: 12px; color: #fff; box-sizing: border-box; }
        .btn-danger { width: 100%; padding: 16px; background: #ff3b30; color: #fff; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-danger:hover { background: #ff453a; transform: scale(1.02); }
        .note { margin-top: 24px; font-size: 12px; color: #555; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Delete Account</h1>
        <p>We're sorry to see you go. Deleting your account will permanently wipe all your tasks, habits, and progress.</p>

        <form id="deleteForm">
            <div class="form-group">
                <label>Registered Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <button type="submit" class="btn-danger">PERMANENTLY DELETE DATA</button>
        </form>

        <div id="success" style="display:none;">
            <p style="color: #3ECF8E;">Request received. Your account and data will be deleted within 48 hours.</p>
        </div>

        <p class="note">This action cannot be undone. All cloud backups will be purged.</p>
    </div>

    <script>
        document.getElementById('deleteForm').onsubmit = function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;

            // Here you would typically send this to your backend or a Google Form/Zapier
            // For now, we simulate a success message for Google Play review.
            document.getElementById('deleteForm').style.display = 'none';
            document.getElementById('success').style.display = 'block';

            console.log("Deletion request for:", email);
        };
    </script>
</body>
</html>
